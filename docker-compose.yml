# Usage (run each in its own terminal):
#   docker compose --env-file stores/phin-and-beans.env -p phin-and-beans up
#   docker compose --env-file stores/phin-drips.env     -p phin-drips     up
#   docker compose --env-file stores/daboba.env         -p daboba         up
#
# Phin and Beans: frontend :5173  backend :8000  db :5432
# Phin Drips:     frontend :5174  backend :8001  db :5433
# Daboba:         frontend :5175  backend :8002  db :5434

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.2:1b}"]
    restart: "no"

  coffee-tea-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-phin_and_beans}
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ${DB_VOLUME:-coffee_tea_postgres}:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  5

  coffee-tea-api:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      STORE_NAME:           ${STORE_NAME:-Phin and Beans}
      STORE_SLUG:           ${STORE_SLUG:-phin-and-beans}
      STORE_DOMAIN:         ${STORE_DOMAIN:-}
      DATABASE_URL:         postgresql://postgres:password@coffee-tea-db:5432/${POSTGRES_DB:-phin_and_beans}
      SECRET_KEY:           ${SECRET_KEY:-change-this-in-production}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SQUARE_ACCESS_TOKEN:   ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_LOCATION_ID:    ${SQUARE_LOCATION_ID:-}
      MENU_S3_BUCKET:        ${MENU_S3_BUCKET:-}
      GOOGLE_MAPS_API_KEY:   ${GOOGLE_MAPS_API_KEY:-}
      DYNAMODB_TABLE_MENU:   ${DYNAMODB_TABLE_MENU:-phin-and-beans-menu}
      DYNAMODB_TABLE_DEALS:  ${DYNAMODB_TABLE_DEALS:-phin-and-beans-deals}
      OLLAMA_BASE_URL:       http://ollama:11434
      OLLAMA_MODEL:          ${OLLAMA_MODEL:-llama3.2:1b}
      ENVIRONMENT:           development
    depends_on:
      coffee-tea-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  coffee-tea-web:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_STORE_NAME:    ${STORE_NAME:-Phin and Beans}
      VITE_STORE_TAGLINE: ${STORE_TAGLINE:-Vietnamese-inspired coffee & tea, crafted with care.}
      VITE_GRAB_URL:      ${GRAB_URL:-}
      VITE_API_URL:       http://coffee-tea-api:8000
    depends_on:
      - coffee-tea-api
      - ollama
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    command: npm run dev -- --host 0.0.0.0

volumes:
  coffee_tea_postgres_phin_and_beans:
  coffee_tea_postgres_phin_drips:
  coffee_tea_postgres_daboba:
  ollama_models:

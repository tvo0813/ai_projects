name: CI / CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPO_DEV: ${{ vars.ECR_REPO_DEV }}
  ECR_REPO_PROD: ${{ vars.ECR_REPO_PROD }}

# ─────────────────────────────────────────────
# JOB 1: Build & push Docker image to ECR
# ─────────────────────────────────────────────
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image (dev ECR)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REPO_DEV }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REPO_DEV }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REPO_DEV }}:latest
          cache-to: type=inline

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_STORE_NAME: ${{ vars.STORE_NAME }}
          VITE_STORE_TAGLINE: ${{ vars.STORE_TAGLINE }}
        run: |
          npm ci
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

# ─────────────────────────────────────────────
# JOB 2: Backend unit tests
# ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run pytest
        env:
          STORE_NAME: "Test Store"
          SECRET_KEY: "test-secret-key"
          DATABASE_URL: ""   # conftest uses SQLite
        run: pytest --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/.pytest_cache

# ─────────────────────────────────────────────
# JOB 3: Deploy to dev
# ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: unit-test
    environment: dev
    outputs:
      backend_url: ${{ steps.tf-output.outputs.backend_url }}
      frontend_url: ${{ steps.tf-output.outputs.frontend_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform init (dev)
        working-directory: terraform/envs/dev
        run: terraform init

      - name: Terraform apply (dev)
        working-directory: terraform/envs/dev
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.DEV_SECRET_KEY }}
          TF_VAR_stripe_secret_key: ${{ secrets.DEV_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.DEV_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_square_access_token: ${{ secrets.DEV_SQUARE_ACCESS_TOKEN }}
          TF_VAR_square_location_id: ${{ secrets.DEV_SQUARE_LOCATION_ID }}
          TF_VAR_store_name: ${{ vars.STORE_NAME }}
          TF_VAR_store_domain: ${{ vars.DEV_STORE_DOMAIN }}
        run: terraform apply -auto-approve

      - name: Get Terraform outputs
        id: tf-output
        working-directory: terraform/envs/dev
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "cf_dist=$(terraform output -raw cf_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"

      - name: Update ECS service with new image
        run: |
          aws ecs update-service \
            --cluster ${{ steps.tf-output.outputs.ecs_cluster }} \
            --service ${{ steps.tf-output.outputs.ecs_service }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          aws ecs wait services-stable \
            --cluster ${{ steps.tf-output.outputs.ecs_cluster }} \
            --services ${{ steps.tf-output.outputs.ecs_service }} \
            --region ${{ env.AWS_REGION }}

      - name: Run DB migrations on dev
        run: |
          # Kick off a one-off ECS task to run alembic
          aws ecs run-task \
            --cluster ${{ steps.tf-output.outputs.ecs_cluster }} \
            --task-definition coffee-tea-dev-backend \
            --launch-type FARGATE \
            --overrides '{"containerOverrides":[{"name":"backend","command":["alembic","upgrade","head"]}]}' \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.DEV_PRIVATE_SUBNET_IDS }}],securityGroups=[${{ vars.DEV_ECS_SG_ID }}],assignPublicIp=DISABLED}" \
            --region ${{ env.AWS_REGION }}

      - name: Deploy frontend to S3 + invalidate CloudFront
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.tf-output.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html s3://${{ steps.tf-output.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf-output.outputs.cf_dist }} \
            --paths "/*"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

# ─────────────────────────────────────────────
# JOB 4: End-to-end tests against dev
# ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/e2e/package.json

      - name: Install Playwright
        working-directory: tests/e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          E2E_FRONTEND_URL: ${{ needs.deploy-dev.outputs.frontend_url }}
          E2E_API_URL: ${{ needs.deploy-dev.outputs.backend_url }}
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

# ─────────────────────────────────────────────
# JOB 5: Deploy to prod (manual gate)
# ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Prod
    runs-on: ubuntu-latest
    needs: e2e
    # Only runs on push to main (not PRs), and requires manual approval
    # via the "prod" GitHub environment protection rule
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote image to prod ECR
        run: |
          docker pull ${{ env.ECR_REPO_DEV }}:${{ github.sha }}
          docker tag  ${{ env.ECR_REPO_DEV }}:${{ github.sha }} ${{ env.ECR_REPO_PROD }}:${{ github.sha }}
          docker tag  ${{ env.ECR_REPO_DEV }}:${{ github.sha }} ${{ env.ECR_REPO_PROD }}:latest
          docker push ${{ env.ECR_REPO_PROD }}:${{ github.sha }}
          docker push ${{ env.ECR_REPO_PROD }}:latest

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform init (prod)
        working-directory: terraform/envs/prod
        run: terraform init

      - name: Terraform apply (prod)
        working-directory: terraform/envs/prod
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.PROD_SECRET_KEY }}
          TF_VAR_stripe_secret_key: ${{ secrets.PROD_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.PROD_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_square_access_token: ${{ secrets.PROD_SQUARE_ACCESS_TOKEN }}
          TF_VAR_square_location_id: ${{ secrets.PROD_SQUARE_LOCATION_ID }}
          TF_VAR_store_name: ${{ vars.STORE_NAME }}
          TF_VAR_store_domain: ${{ vars.PROD_STORE_DOMAIN }}
          TF_VAR_domain_aliases: ${{ vars.PROD_DOMAIN_ALIASES }}
          TF_VAR_acm_certificate_arn: ${{ secrets.PROD_ACM_CERT_ARN }}
        run: terraform apply -auto-approve

      - name: Get prod Terraform outputs
        id: tf-output
        working-directory: terraform/envs/prod
        run: |
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "cf_dist=$(terraform output -raw cf_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"

      - name: Update ECS service (prod)
        run: |
          aws ecs update-service \
            --cluster ${{ steps.tf-output.outputs.ecs_cluster }} \
            --service ${{ steps.tf-output.outputs.ecs_service }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          aws ecs wait services-stable \
            --cluster ${{ steps.tf-output.outputs.ecs_cluster }} \
            --services ${{ steps.tf-output.outputs.ecs_service }} \
            --region ${{ env.AWS_REGION }}

      - name: Run DB migrations (prod)
        run: |
          aws ecs run-task \
            --cluster ${{ steps.tf-output.outputs.ecs_cluster }} \
            --task-definition coffee-tea-prod-backend \
            --launch-type FARGATE \
            --overrides '{"containerOverrides":[{"name":"backend","command":["alembic","upgrade","head"]}]}' \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.PROD_PRIVATE_SUBNET_IDS }}],securityGroups=[${{ vars.PROD_ECS_SG_ID }}],assignPublicIp=DISABLED}" \
            --region ${{ env.AWS_REGION }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy frontend to prod S3 + invalidate CloudFront
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.tf-output.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html s3://${{ steps.tf-output.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf-output.outputs.cf_dist }} \
            --paths "/*"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/menus/**'
      - 'scripts/generate-static-data.js'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Generate static JSON from CSV files — no Python/FastAPI needed
      - name: Generate static data
        run: node scripts/generate-static-data.js

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Build with static mode on. Override store vars here or via repo secrets.
      - name: Build
        working-directory: frontend
        env:
          VITE_STATIC_MODE: 'true'
          VITE_STORE_SLUG:    ${{ vars.VITE_STORE_SLUG    || 'phin-and-beans' }}
          VITE_STORE_NAME:    ${{ vars.VITE_STORE_NAME    || 'Phin and Beans' }}
          VITE_STORE_TAGLINE: ${{ vars.VITE_STORE_TAGLINE || 'Vietnamese-inspired coffee & tea, crafted with care.' }}
          VITE_GRAB_URL:      ${{ vars.VITE_GRAB_URL      || '' }}
        run: npm run build

      # SPA fallback: copy index.html → 404.html so deep links work on GitHub Pages
      - name: SPA 404 fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

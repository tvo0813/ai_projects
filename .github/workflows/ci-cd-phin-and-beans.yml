name: Phin and Beans — CI/CD

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/app/**'
      - 'backend/requirements*.txt'
      - 'backend/Dockerfile'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package*.json'
      - 'frontend/vite.config.ts'
      - 'frontend/index.html'
      - 'backend/menus/phin-and-beans/**'
      - 'docker-compose.yml'
  push:
    branches: [main, develop]
    paths:
      - 'backend/app/**'
      - 'backend/requirements*.txt'
      - 'backend/Dockerfile'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package*.json'
      - 'frontend/vite.config.ts'
      - 'frontend/index.html'
      - 'backend/menus/phin-and-beans/**'
      - 'docker-compose.yml'

concurrency:
  group: phin-and-beans-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# All store values mirror stores/phin-and-beans.env (which is gitignored).
# RENDER_DOMAIN is the onrender.com URL assigned when you created the service.
# ─────────────────────────────────────────────────────────────────────────────
env:
  STORE_SLUG:    phin-and-beans
  STORE_NAME:    "Phin and Beans"
  STORE_TAGLINE: "Vietnamese-inspired coffee & tea, crafted with care."
  GRAB_URL:      "https://food.grab.com/your-phin-and-beans-listing"
  OLLAMA_MODEL:  llama3.2:1b
  RENDER_DOMAIN: phin-and-beans.onrender.com
  SECRET_KEY:    ${{ secrets.COFFEE_SHOP_SECRET_KEY }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend unit tests
  # ─────────────────────────────────────────────────────────────────────────
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run pytest
        env:
          STORE_NAME: "Test Store"
          SECRET_KEY: "test-secret-key"
        run: pytest --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-phin-and-beans
          path: backend/.pytest_cache

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend (validates the build compiles cleanly)
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_STORE_SLUG:    ${{ env.STORE_SLUG }}
          VITE_STORE_NAME:    ${{ env.STORE_NAME }}
          VITE_STORE_TAGLINE: ${{ env.STORE_TAGLINE }}
          VITE_GRAB_URL:      ${{ env.GRAB_URL }}
        run: |
          npm ci
          npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy backend to Render (push to main only, after tests pass)
  # Secrets needed in GitHub:
  #   RENDER_API_KEY                    — Render account API key
  #   RENDER_SERVICE_ID_PHIN_AND_BEANS  — srv-xxxxxxxx from Render service URL
  #   RENDER_DEPLOY_HOOK_PHIN_AND_BEANS — deploy hook URL from Render service settings
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs: [unit-test, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Push env vars to Render
        run: |
          curl -fsSL -X PUT "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_PHIN_AND_BEANS }}/env-vars" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '[
              {"key": "STORE_SLUG",      "value": "${{ env.STORE_SLUG }}"},
              {"key": "STORE_NAME",      "value": "${{ env.STORE_NAME }}"},
              {"key": "STORE_TAGLINE",   "value": "${{ env.STORE_TAGLINE }}"},
              {"key": "STORE_DOMAIN",    "value": "${{ env.RENDER_DOMAIN }}"},
              {"key": "SECRET_KEY",      "value": "${{ env.SECRET_KEY }}"},
              {"key": "ENVIRONMENT",     "value": "production"},
              {"key": "OLLAMA_BASE_URL", "value": "http://localhost:11434"},
              {"key": "OLLAMA_MODEL",    "value": "${{ env.OLLAMA_MODEL }}"}
            ]'

      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PHIN_AND_BEANS }}"

name: Phin Drips — CI/CD

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/app/**'
      - 'backend/requirements*.txt'
      - 'backend/Dockerfile'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package*.json'
      - 'frontend/vite.config.ts'
      - 'frontend/index.html'
      - 'backend/menus/phin-drips/**'
      - 'scripts/generate-static-data.js'
      - 'docker-compose.yml'
      - '.github/workflows/ci-cd-phin-drips.yml'
  push:
    branches: [main, develop]
    paths:
      - 'backend/app/**'
      - 'backend/requirements*.txt'
      - 'backend/Dockerfile'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package*.json'
      - 'frontend/vite.config.ts'
      - 'frontend/index.html'
      - 'backend/menus/phin-drips/**'
      - 'scripts/generate-static-data.js'
      - 'docker-compose.yml'
      - '.github/workflows/ci-cd-phin-drips.yml'
  workflow_dispatch:

concurrency:
  group: phin-drips-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# ─────────────────────────────────────────────────────────────────────────────
# Store config — mirrors stores/phin-drips.env (which is gitignored).
# RENDER_DOMAIN is the onrender.com URL assigned when you created the service.
# ─────────────────────────────────────────────────────────────────────────────
env:
  STORE_SLUG:    phin-drips
  STORE_NAME:    "Phin Drips"
  STORE_TAGLINE: "Bold Vietnamese drip coffee, your way."
  GRAB_URL:      "https://food.grab.com/your-phin-drips-listing"
  OLLAMA_MODEL:  llama3.2:1b
  RENDER_DOMAIN: coffee-shop-wm2v.onrender.com
  SECRET_KEY:    ${{ secrets.COFFEE_SHOP_SECRET_KEY }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend unit tests
  # ─────────────────────────────────────────────────────────────────────────
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run pytest
        env:
          STORE_NAME: "Test Store"
          SECRET_KEY: "test-secret-key"
        run: pytest --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-phin-drips
          path: backend/.pytest_cache

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy frontend to GitHub Pages (push to main only)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: unit-test
    environment: phin_drips
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate static data
        run: node scripts/generate-static-data.js

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_STATIC_MODE:   'true'
          VITE_STORE_SLUG:    ${{ env.STORE_SLUG }}
          VITE_STORE_NAME:    ${{ env.STORE_NAME }}
          VITE_STORE_TAGLINE: ${{ env.STORE_TAGLINE }}
          VITE_GRAB_URL:      ${{ env.GRAB_URL }}
        run: npm run build

      - name: SPA 404 fallback
        run: |
          cat > frontend/dist/404.html << 'EOF'
          <!doctype html>
          <html><head>
          <meta charset="UTF-8"/>
          <script>sessionStorage.setItem('spa_redirect', location.pathname + location.search + location.hash); location.replace('/ai_projects/');</script>
          </head></html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy backend to Render (push to main only, after tests pass)
  # Secrets needed in the phin_drips GitHub environment:
  #   RENDER_API_KEY      — Render account API key
  #   RENDER_SERVICE_ID   — srv-xxxxxxxx from Render service URL
  #   RENDER_DEPLOY_HOOK  — deploy hook URL from Render service settings
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs: unit-test
    environment: phin_drips
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Push env vars to Render
        run: |
          curl -fsSL -X PUT "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/env-vars" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '[
              {"key": "STORE_SLUG",      "value": "${{ env.STORE_SLUG }}"},
              {"key": "STORE_NAME",      "value": "${{ env.STORE_NAME }}"},
              {"key": "STORE_TAGLINE",   "value": "${{ env.STORE_TAGLINE }}"},
              {"key": "STORE_DOMAIN",    "value": "${{ env.RENDER_DOMAIN }}"},
              {"key": "SECRET_KEY",      "value": "${{ env.SECRET_KEY }}"},
              {"key": "ENVIRONMENT",     "value": "production"},
              {"key": "OLLAMA_BASE_URL", "value": "http://localhost:11434"},
              {"key": "OLLAMA_MODEL",    "value": "${{ env.OLLAMA_MODEL }}"}
            ]'

      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
